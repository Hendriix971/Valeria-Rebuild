<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Mini RPG Online</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; user-select:none; }
  html, body { width:100%; height:100%; overflow:hidden; background:#1a1a2e; font-family:sans-serif; }
  #wrapper { width:100%; height:100%; display:flex; align-items:center; justify-content:center; flex-direction:column; gap:16px; }
  #game { position:relative; width:min(90vw,500px); aspect-ratio:1; background:#2d2d44; border-radius:12px; overflow:hidden; }
  canvas { display:block; width:100%; height:100%; }
  #status { color:#888; font-size:14px; text-align:center; padding:0 16px; }
  #controls { display:grid; grid-template-areas:". up ." "left down right"; grid-template-columns:repeat(3,56px); grid-template-rows:repeat(2,56px); gap:6px; }
  #controls button { width:56px; height:56px; border:2px solid rgba(255,255,255,0.2); background:rgba(255,255,255,0.08); border-radius:12px; color:#fff; font-size:22px; cursor:pointer; touch-action:none; }
  #controls button:active { background:rgba(255,255,255,0.25); }
  #btn-up { grid-area:up; }
  #btn-left { grid-area:left; }
  #btn-down { grid-area:down; }
  #btn-right { grid-area:right; }
  @media (pointer:coarse) and (hover:none) {
    #controls { transform:scale(0.85); }
  }
</style>
</head>
<body>
<div id="wrapper">
  <div id="game"><canvas id="canvas"></canvas></div>
  <div id="status">Connexion...</div>
  <div id="controls">
    <button id="btn-up">▲</button>
    <button id="btn-left">◀</button>
    <button id="btn-down">▼</button>
    <button id="btn-right">▶</button>
  </div>
</div>
<script>
const canvas = document.getElementById('canvas')
const ctx = canvas.getContext('2d')
const statusEl = document.getElementById('status')
const TILE = 100
const COLORS = ['#ff6b6b','#4ecdc4','#ffd93d','#a66cff','#ff8a5c','#6bcbff','#ff6b9d','#95e1d3']
const CELL_COLOR = '#3a3a5c'
const GRID_LINE = 'rgba(255,255,255,0.1)'

let me = { id: null, x: 0, y: 0 }
let others = {}
let mapSize = 5

canvas.width = mapSize * TILE
canvas.height = mapSize * TILE

function resize() {
  const rect = document.getElementById('game').getBoundingClientRect()
  canvas.style.width = rect.width + 'px'
  canvas.style.height = rect.height + 'px'
}
window.addEventListener('resize', resize)

function draw() {
  canvas.width = mapSize * TILE
  canvas.height = mapSize * TILE
  ctx.imageSmoothingEnabled = false

  for (let y = 0; y < mapSize; y++) {
    for (let x = 0; x < mapSize; x++) {
      ctx.fillStyle = CELL_COLOR
      ctx.fillRect(x * TILE, y * TILE, TILE, TILE)
      ctx.strokeStyle = GRID_LINE
      ctx.lineWidth = 1
      ctx.strokeRect(x * TILE, y * TILE, TILE, TILE)
    }
  }

  // Dessine les autres joueurs
  for (const [id, p] of Object.entries(others)) {
    if (id === me.id) continue
    drawPlayer(p.x, p.y, COLORS[id.charCodeAt(0) % COLORS.length], id === me.id)
  }

  // Dessine moi par-dessus
  if (me.id) {
    drawPlayer(me.x, me.y, '#ffd700', true)
  }
}

function drawPlayer(tx, ty, color, isMe) {
  const cx = tx * TILE + TILE / 2
  const cy = ty * TILE + TILE / 2
  const r = isMe ? TILE * 0.35 : TILE * 0.3

  ctx.beginPath()
  ctx.arc(cx, cy, r, 0, Math.PI * 2)
  ctx.fillStyle = color
  ctx.fill()
  ctx.strokeStyle = isMe ? '#fff' : 'rgba(255,255,255,0.5)'
  ctx.lineWidth = 3
  ctx.stroke()

  if (isMe) {
    ctx.fillStyle = '#fff'
    ctx.font = 'bold 14px sans-serif'
    ctx.textAlign = 'center'
    ctx.textBaseline = 'middle'
    ctx.fillText('MOI', cx, cy + 2)
  }
}

function sendMove(dx, dy) {
  if (!me.id) return
  ws.send(JSON.stringify({ type: 'move', dx, dy }))
}

const ws = new WebSocket(`${location.protocol === 'https:' ? 'wss:' : 'ws:'}//${location.host}`)

ws.onopen = () => statusEl.textContent = '✅ Connecté !'
ws.onclose = () => statusEl.textContent = '❌ Déconnecté'
ws.onerror = () => statusEl.textContent = '❌ Erreur de connexion'

ws.onmessage = (e) => {
  const msg = JSON.parse(e.data)
  console.log('Reçu:', msg)

  if (msg.type === 'init') {
    me.id = msg.yourId
    mapSize = msg.mapSize
    me.x = msg.players[me.id].x
    me.y = msg.players[me.id].y
    others = msg.players
    delete others[me.id]
    statusEl.textContent = `connecté ! Joueurs: ${Object.keys(others).length + 1}`
    resize()
    draw()
  } else if (msg.type === 'join') {
    others[msg.id] = { x: msg.x, y: msg.y }
    statusEl.textContent = `Joueurs: ${Object.keys(others).length + 1}`
    draw()
  } else if (msg.type === 'move') {
    if (others[msg.id]) others[msg.id] = { x: msg.x, y: msg.y }
    draw()
  } else if (msg.type === 'leave') {
    delete others[msg.id]
    statusEl.textContent = `Joueurs: ${Object.keys(others).length + 1}`
    draw()
  }
}

// Clavier
document.addEventListener('keydown', (e) => {
  switch (e.key) {
    case 'ArrowUp': case 'w': case 'W': e.preventDefault(); sendMove(0, -1); break
    case 'ArrowDown': case 's': case 'S': e.preventDefault(); sendMove(0, 1); break
    case 'ArrowLeft': case 'a': case 'A': e.preventDefault(); sendMove(-1, 0); break
    case 'ArrowRight': case 'd': case 'D': e.preventDefault(); sendMove(1, 0); break
  }
})

// Contrôles tactiles
document.getElementById('btn-up').addEventListener('click', () => sendMove(0, -1))
document.getElementById('btn-down').addEventListener('click', () => sendMove(0, 1))
document.getElementById('btn-left').addEventListener('click', () => sendMove(-1, 0))
document.getElementById('btn-right').addEventListener('click', () => sendMove(1, 0))
</script>
</body>
</html>
